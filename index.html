<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Educa Jundiaí</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0B4A2B',    /* Verde Floresta Escuro */
                        secondary: '#5CE1E6',  /* Verde Menta / Ciano */
                        bglight: '#F4F6F8',    /* Cinzento Claro (Fundo) */
                        cardbg: '#FFFFFF',     /* Fundo do Cartão */
                        darktext: '#333333',
                        lighttext: '#666666'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-bglight flex items-center justify-center h-screen">

    <div class="bg-cardbg p-10 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-3 mb-4">
                <span class="h-6 w-6 bg-secondary rounded-full block"></span>
                <h1 class="text-3xl font-bold text-primary tracking-wider">50cents</h1>
            </div>
            <h2 class="text-xl font-bold text-darktext">Acesso ao Sistema</h2>
            <p class="text-sm text-lighttext mt-2">E.M.E.B. Deputado Ranieri Masili</p>
        </div>

        <form id="form-login" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-darktext mb-1">E-mail</label>
                <input type="email" id="email" required 
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition"
                       placeholder="Insira seu e-mail">
            </div>

            <div>
                <label for="senha" class="block text-sm font-medium text-darktext mb-1">Senha</label>
                <input type="password" id="senha" required 
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition"
                       placeholder="Insira sua senha">
            </div>

            <button type="submit" 
                    class="w-full bg-primary hover:bg-[#083820] text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-200">
                Entrar no Painel
            </button>
        </form>

        <div id="alerta-reset" class="hidden mt-4 p-3 bg-green-100 text-green-700 text-sm font-bold text-center rounded-lg border border-green-200">
            Todos os cadastros foram zerados com sucesso!
        </div>
        
        <div class="mt-6 text-center">
            <p class="text-xs text-lighttext">Projeto Educa Jundiaí - Liga Jovem 2024</p>
        </div>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que a página recarregue

            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const alerta = document.getElementById('alerta-reset');

            // ---------------------------------------------------------
            // CÓDIGO SECRETO PARA ZERAR CADASTROS (BACKDOOR DE TESTES)
            // ---------------------------------------------------------
            if (email === 'republicadominicana.50cents@gmail.com' && senha === 'zerar') {
                // Limpa todo o armazenamento local (cadastros)
                localStorage.clear();
                
                // Exibe a mensagem de sucesso
                alerta.classList.remove('hidden');
                
                // Limpa os campos do formulário
                document.getElementById('form-login').reset();
                
                // Esconde a mensagem depois de 4 segundos
                setTimeout(() => {
                    alerta.classList.add('hidden');
                }, 4000);
                
                return; // Para a execução aqui, não redireciona
            }

            // ---------------------------------------------------------
            // LÓGICA NORMAL DE LOGIN
            // ---------------------------------------------------------
            // Se não for o e-mail de reset, ele simplesmente vai para o painel
            window.location.href = 'painel.html';
        });
    </script>
</body>
</html>
