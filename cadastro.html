<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contas - Educa Jundiaí</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0B4A2B',
                        secondary: '#5CE1E6',
                        bglight: '#F4F6F8',
                        cardbg: '#FFFFFF',
                        darktext: '#333333',
                        lighttext: '#666666'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-bglight flex items-center justify-center min-h-screen p-4 md:p-8">

    <div class="bg-cardbg p-6 sm:p-10 rounded-2xl shadow-xl w-full max-w-2xl border border-gray-100 my-4">
        
        <div class="text-center mb-8">
            <div class="flex justify-center items-center gap-2 mb-2">
                <span class="h-5 w-5 bg-secondary rounded-full block"></span>
                <h1 class="text-3xl font-bold text-primary tracking-wider">50cents</h1>
            </div>
            <h2 class="text-xl font-bold text-darktext">Criar ou Atualizar Conta</h2>
            <p class="text-xs text-lighttext mt-1">Modo Administrador — Liga Jovem 2024</p>
        </div>

        <form id="form-cadastro" class="space-y-5">
            
            <div>
                <label for="tipoConta" class="block text-sm font-medium text-darktext mb-1">Tipo de Conta (Cargo)</label>
                <select id="tipoConta" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition bg-white text-darktext">
                    <option value="aluno">Aluno</option>
                    <option value="professor">Professor</option>
                    <option value="operador">Operador (Coordenação)</option>
                </select>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="nome" class="block text-sm font-medium text-darktext mb-1">Primeiro Nome</label>
                    <input type="text" id="nome" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition text-darktext" placeholder="Ex: João">
                </div>
                <div>
                    <label for="sobrenome" class="block text-sm font-medium text-darktext mb-1">Sobrenome</label>
                    <input type="text" id="sobrenome" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition text-darktext" placeholder="Ex: Silva">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="dataNascimento" class="block text-sm font-medium text-darktext mb-1">Data de Nascimento</label>
                    <input type="date" id="dataNascimento" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition text-darktext">
                </div>
                <div>
                    <label for="registro" class="block text-sm font-medium text-darktext mb-1">RA (Registro do Aluno) / RE</label>
                    <input type="text" id="registro" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition text-darktext" placeholder="Ex: 123456789">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                <div class="md:col-span-6">
                    <label for="escola" class="block text-sm font-medium text-darktext mb-1">Escola</label>
                    <input type="text" id="escola" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition text-darktext" placeholder="Ex: Ranieri Masili">
                </div>
                
                <div class="md:col-span-4">
                    <label for="serie" class="block text-sm font-medium text-lighttext mb-1">Série <span class="text-xs text-gray-400 font-normal">(Opcional)</span></label>
                    <select id="serie" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition bg-white text-darktext">
                        <option value="">Selecione...</option>
                        <option value="6º Ano">6º Ano (Fundamental)</option>
                        <option value="7º Ano">7º Ano (Fundamental)</option>
                        <option value="8º Ano">8º Ano (Fundamental)</option>
                        <option value="9º Ano">9º Ano (Fundamental)</option>
                        <option value="1º Ano EM">1º Ano (Ensino Médio)</option>
                        <option value="2º Ano EM">2º Ano (Ensino Médio)</option>
                        <option value="3º Ano EM">3º Ano (Ensino Médio)</option>
                    </select>
                </div>

                <div class="md:col-span-2">
                    <label for="turma" class="block text-sm font-medium text-lighttext mb-1">Turma <span class="text-xs text-gray-400 font-normal">(Opcional)</span></label>
                    <select id="turma" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition bg-white text-darktext">
                        <option value="">Selecione...</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                        <option value="E">E</option>
                    </select>
                </div>
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-darktext mb-1">E-mail Institucional ou Pessoal</label>
                <input type="email" id="email" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition text-darktext" placeholder="exemplo@escola.com">
                <p class="text-[11px] text-gray-400 mt-1">Se o e-mail já existir, as informações do perfil serão atualizadas.</p>
            </div>

            <div>
                <label for="senha" class="block text-sm font-medium text-darktext mb-1">Senha</label>
                <div class="relative">
                    <input type="password" id="senha" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition text-darktext" placeholder="Crie uma senha segura">
                    <button type="button" id="btn-toggle-senha" class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-bold text-primary hover:text-[#083820] transition">Ver</button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-lighttext mb-1">Foto de Perfil <span class="text-xs text-gray-400 font-normal">(Opcional)</span></label>
                <div class="flex items-center width-full border border-gray-300 rounded-lg p-1.5 bg-white">
                    <label for="foto" class="cursor-pointer bg-gray-100 hover:bg-gray-200 text-darktext text-xs font-bold py-2 px-4 rounded-md transition border border-gray-200 shadow-sm whitespace-nowrap">
                        Escolher arquivo
                    </label>
                    <input type="file" id="foto" accept="image/*" class="hidden">
                    <span id="nome-arquivo" class="text-xs text-lighttext ml-3 truncate">Nenhum arquivo escolhido</span>
                </div>
            </div>

            <button type="submit" class="w-full bg-primary hover:bg-[#083820] text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition duration-200 mt-6 flex justify-center items-center gap-2">
                <i class="ph ph-floppy-disk text-xl"></i> Salvar Cadastro
            </button>

            <div class="text-center pt-2">
                <button type="button" onclick="voltarPainel()" class="text-xs text-lighttext hover:text-primary font-semibold transition underline">Voltar para o Painel Administrativo</button>
            </div>
        </form>
    </div>

    <script>
        // TOGGLE VISIBILIDADE DA SENHA
        const inputSenha = document.getElementById('senha');
        const btnToggleSenha = document.getElementById('btn-toggle-senha');

        btnToggleSenha.addEventListener('click', () => {
            if (inputSenha.type === 'password') {
                inputSenha.type = 'text';
                btnToggleSenha.innerText = 'Ocultar';
            } else {
                inputSenha.type = 'password';
                btnToggleSenha.innerText = 'Ver';
            }
        });

        // NOME DO ARQUIVO DA FOTO
        const inputFoto = document.getElementById('foto');
        const txtNomeArquivo = document.getElementById('nome-arquivo');
        let fotoBase64 = null;

        inputFoto.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const arquivo = e.target.files[0];
                txtNomeArquivo.innerText = arquivo.name;

                // Converte a imagem para Base64 para salvar direto no localStorage
                const reader = new FileReader();
                reader.onload = function(evt) {
                    fotoBase64 = evt.target.result;
                };
                reader.readAsDataURL(arquivo);
            } else {
                txtNomeArquivo.innerText = 'Nenhum arquivo escolhido';
                fotoBase64 = null;
            }
        });

        // REDIRECIONAMENTO INTELIGENTE DE VOLTA
        function voltarPainel() {
            const logado = JSON.parse(localStorage.getItem('usuarioLogado'));
            if(logado && logado.tipoConta === 'operador') {
                window.location.href = 'painel-do-operador.html';
            } else {
                window.location.href = 'index.html';
            }
        }

        // SALVAR NO LOCALSTORAGE (CRIAR OU ATUALIZAR)
        document.getElementById('form-cadastro').addEventListener('submit', function(e) {
            e.preventDefault();

            const emailInformado = document.getElementById('email').value.trim().toLowerCase();
            let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];

            // Objeto com os dados do formulário
            const dadosUsuario = {
                tipoConta: document.getElementById('tipoConta').value,
                nome: document.getElementById('nome').value.trim(),
                sobrenome: document.getElementById('sobrenome').value.trim(),
                dataNascimento: document.getElementById('dataNascimento').value,
                registro: document.getElementById('registro').value.trim(),
                escola: document.getElementById('escola').value.trim(),
                serie: document.getElementById('serie').value, // Captura valor do dropdown
                turma: document.getElementById('turma').value, // Captura valor do dropdown
                email: emailInformado,
                senha: inputSenha.value.trim(),
                foto: fotoBase64
            };

            // Verifica se o usuário já existe no "Banco de dados"
            const indiceExistente = usuarios.findIndex(u => u.email === emailInformado);

            if (indiceExistente !== -1) {
                // Se não anexou foto nova no update, mantém a foto antiga
                if (!dadosUsuario.foto) {
                    dadosUsuario.foto = usuarios[indiceExistente].foto;
                }
                // Atualiza o perfil existente
                usuarios[indiceExistente] = dadosUsuario;
                alert('Cadastro atualizado com sucesso!');
            } else {
                // Adiciona uma nova conta
                usuarios.push(dadosUsuario);
                alert('Nova conta criada com sucesso!');
            }

            localStorage.setItem('usuarios', JSON.stringify(usuarios));
            document.getElementById('form-cadastro').reset();
            txtNomeArquivo.innerText = 'Nenhum arquivo escolhido';
            fotoBase64 = null;
            
            voltarPainel();
        });
    </script>
</body>
</html>
