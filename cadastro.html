<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Educa Jundiaí</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0B4A2B',    /* Verde Floresta Escuro */
                        secondary: '#5CE1E6',  /* Verde Menta / Ciano */
                        bglight: '#F4F6F8',    /* Cinzento Claro (Fundo) */
                        cardbg: '#FFFFFF',     /* Fundo do Cartão */
                        darktext: '#333333',
                        lighttext: '#666666'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-bglight flex items-center justify-center min-h-screen p-4">

    <div class="bg-cardbg p-8 sm:p-10 rounded-2xl shadow-xl w-full max-w-lg border border-gray-100 my-8">
        
        <div class="text-center mb-6">
            <div class="flex items-center justify-center gap-3 mb-2">
                <span class="h-6 w-6 bg-secondary rounded-full block"></span>
                <h1 class="text-3xl font-bold text-primary tracking-wider">50cents</h1>
            </div>
            <h2 class="text-xl font-bold text-darktext">Criar ou Atualizar Conta</h2>
            <p class="text-sm text-lighttext mt-1">Rede Escolar — Liga Jovem 2024</p>
        </div>

        <form id="form-cadastro" class="space-y-4">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="nome" class="block text-sm font-medium text-darktext mb-1">Primeiro Nome</label>
                    <input type="text" id="nome" required 
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition"
                           placeholder="Ex: João">
                </div>
                <div>
                    <label for="sobrenome" class="block text-sm font-medium text-darktext mb-1">Sobrenome</label>
                    <input type="text" id="sobrenome" required 
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition"
                           placeholder="Ex: Silva">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="ra" class="block text-sm font-medium text-darktext mb-1">RA (Registro do Aluno)</label>
                    <input type="text" id="ra" required 
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition"
                           placeholder="Ex: 123456789">
                </div>
                <div>
                    <label for="escola" class="block text-sm font-medium text-darktext mb-1">Escola</label>
                    <input type="text" id="escola" required 
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition"
                           placeholder="Ex: Ranieri Masili">
                </div>
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-darktext mb-1">E-mail Institucional ou Pessoal</label>
                <input type="email" id="email" required 
                       class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition"
                       placeholder="exemplo@escola.com">
                <p class="text-xs text-gray-400 mt-1">Se o e-mail já existir, as informações serão atualizadas.</p>
            </div>

            <div>
                <label for="senha" class="block text-sm font-medium text-darktext mb-1">Senha</label>
                <div class="relative">
                    <input type="password" id="senha" required 
                           class="w-full px-4 py-2.5 pr-12 rounded-lg border border-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition"
                           placeholder="Crie uma senha segura">
                    
                    <button type="button" id="btn-ver-senha" 
                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-sm font-semibold text-primary hover:text-[#083820] transition">
                        Ver
                    </button>
                </div>
            </div>

            <div>
                <label for="foto" class="block text-sm font-medium text-darktext mb-1">Foto de Perfil <span class="text-xs text-gray-400 font-normal">(Opcional)</span></label>
                <input type="file" id="foto" accept="image/*"
                       class="w-full text-sm text-lighttext file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-gray-100 file:text-primary hover:file:bg-gray-200 transition cursor-pointer border border-gray-300 rounded-lg p-1.5">
            </div>

            <button type="submit" 
                    class="w-full bg-primary hover:bg-[#083820] text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-200 mt-2">
                Salvar Cadastro
            </button>
        </form>

        <div id="alerta-cadastro" class="hidden mt-4 p-4 bg-green-100 text-green-800 text-xs font-medium rounded-lg border border-green-200 space-y-1 transition-all">
            <p id="titulo-alerta" class="font-bold text-sm text-green-900">✓ Cadastro Realizado!</p>
            <p id="detalhes-cadastro"></p>
        </div>

        <div class="mt-6 text-center border-t border-gray-100 pt-4">
            <p class="text-sm text-lighttext">Deseja entrar no sistema? <a href="index.html" class="text-primary font-bold hover:underline">Ir para o Login</a></p>
            <p class="text-xs text-gray-400 mt-4">Projeto Educa Jundiaí - Liga Jovem 2024</p>
        </div>
    </div>

    <script>
        // Lógica do Botão de Ver / Esconder Senha
        const campoSenha = document.getElementById('senha');
        const btnVerSenha = document.getElementById('btn-ver-senha');

        btnVerSenha.addEventListener('click', function() {
            if (campoSenha.type === 'password') {
                campoSenha.type = 'text';
                btnVerSenha.textContent = 'Ocultar';
            } else {
                campoSenha.type = 'password';
                btnVerSenha.textContent = 'Ver';
            }
        });

        // Lógica de Envio e Armazenamento no LocalStorage
        document.getElementById('form-cadastro').addEventListener('submit', function(e) {
            e.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const sobrenome = document.getElementById('sobrenome').value.trim();
            const ra = document.getElementById('ra').value.trim();
            const escola = document.getElementById('escola').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const inputFoto = document.getElementById('foto');

            const dadosUsuario = {
                nome: nome,
                sobrenome: sobrenome,
                ra: ra,
                escola: escola,
                email: email,
                senha: senha,
                foto: null
            };

            // Se houver uma foto nova, converte e salva. Se não, segue com foto nula para a função avaliar.
            if (inputFoto.files && inputFoto.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    dadosUsuario.foto = e.target.result;
                    salvarOuAtualizar(dadosUsuario);
                };
                reader.readAsDataURL(inputFoto.files[0]);
            } else {
                salvarOuAtualizar(dadosUsuario);
            }
        });

        function salvarOuAtualizar(usuario) {
            let usuariosCadastrados = JSON.parse(localStorage.getItem('usuarios')) || [];
            
            // Verifica se o e-mail já existe na base de dados
            const index = usuariosCadastrados.findIndex(u => u.email === usuario.email);
            
            let tituloMensagem = "✓ Cadastro Realizado!";

            if (index !== -1) {
                // SE O E-MAIL JÁ EXISTIR: Modo Atualização
                
                // Mantém a foto antiga se uma foto nova não foi enviada
                if (!usuario.foto) {
                    usuario.foto = usuariosCadastrados[index].foto;
                }
                
                // Substitui os dados antigos pelos novos
                usuariosCadastrados[index] = usuario;
                tituloMensagem = "✓ Cadastro Atualizado!";
            } else {
                // SE O E-MAIL FOR NOVO: Modo Inserção
                usuariosCadastrados.push(usuario);
            }

            // Salva de volta no navegador
            localStorage.setItem('usuarios', JSON.stringify(usuariosCadastrados));

            // Exibe a notificação com o título correto (Realizado vs Atualizado)
            const alerta = document.getElementById('alerta-cadastro');
            const tituloAlerta = document.getElementById('titulo-alerta');
            const detalhes = document.getElementById('detalhes-cadastro');
            
            tituloAlerta.innerText = tituloMensagem;
            detalhes.innerHTML = `Aluno: <strong>${usuario.nome} ${usuario.sobrenome}</strong><br>RA: <strong>${usuario.ra}</strong> | Escola: <strong>${usuario.escola}</strong>`;
            
            alerta.classList.remove('hidden');

            // Limpa o formulário
            document.getElementById('form-cadastro').reset();
            campoSenha.type = 'password';
            btnVerSenha.textContent = 'Ver';

            // Esconde o aviso depois de 6 segundos
            setTimeout(() => {
                alerta.classList.add('hidden');
            }, 6000);
        }
    </script>
</body>
</html>
